    explicit_decision_rules:
      inclusion: >
        A code availability statement is included in this category if it DOES NOT provide any information on the availability, use or existence of any identifiable element of code/software, whether APSA or EST.
        For instance, statements EXCLUSIVELY providing information about data availability are included in this category. 
        Statements mentioning information about an article's general accessibility conditions (e.g. license associated to the article) are also included in this category. 
      exclusion: >
        A code availability statement is excluded from this category if it provides information on availability, use or existence of AT LEAST ONE identifiable element of code/software, whether APSA or EST.
    ambiguous_cases_notes:
      - Information about data, calculation methods, equations, plots or other research artifacts should NOT be considered as information about code unless explicitly defined as being associated with an element of code/software.
      - >
        The statement "Note that the sources for these examples can be found in the public GitHub repository [57]" mentions "sources for these examples" being provided in a public Github repository.
        Repository location alone is not sufficient evidence of software unless the contents are described as code/software. 
        Therefore, no element of code/software can be identified and the section is classified as "incorrect".
      - >
        The negative examples of the first three hard negative pairs all explicitly specify an identifiable element of code/software (e.g. Mathematica, Python scripts) associated with the research artifact described
        (e.g. "Standard numerical methods", "Numerical analysis"). Since an element of code/software can be identified, these statements are not to be classified as part of the category "incorrect".
