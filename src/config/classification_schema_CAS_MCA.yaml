      - - "this manuscript has associated code/software in a code repository. [authors’ comment: the code generated during and analysed during the current study is available from the corresponding author on reasonable request.]."
        - "this article has associated code in a code repository."
    explicit_decision_rules:
      inclusion: >
        A code availability statement is included in this category when the content states that AT LEAST ONE Author-Produced Software Artifacts is available from a source upon requesting it,
        while also NOT stating that ANY OTHER Author-Produced Software Artifact is openly available.
      exclusion: >
        A code availability statement is excluded from this category if it states that AT LEAST ONE Author-Produced Software Artifact is openly available, ALL Author-Produced Software Artifacts are
        available, or NO Author-Produced Software Artifact is available.
    ambiguous_cases_notes:
      - >
        The initial sentence in the statement "this manuscript has associated code/software in a data repository. [authors’ comment: the code generated during and analysed during the current study is available from the corresponding author on reasonable request.]." 
        says the manuscript has "associated code in a data repository". This sentence alone would be an indication of the existence of an APSA to be classified as "open_access" BUT 
        this interpretation is later contradicted by the following sentence stating that the APSA in question is available upon request. This ambiguous case is also captured by the fourth hard negative pair and by the statement 
        "this article has associated code in a code repository. The code to reproduce the figures of this article will be shared upon request."
      - >
        In the statement "code/software will be made available on reasonable request. [author’s comment: the code we created for this study can be shared upon request. we are still developing the code and we would like to make it publicly available at a later stage.].", authors mention that they would like to "make it publicly available at a later stage.". This by itself is NOT enough to classify the ASPA mentioned as "open_access". 
        The classification should only be guided by the current access conditions specified in the section. That is, the ASPA "can be shared upon request" and therefore the section is classified as "restricted_access" along the "manuscript_code_availability" dimension.
      - >
        The statement "code/software will be made available on reasonable request. [author’s comment: the software used for event generation and analysis is fully open source. Parameter settings can be made available upon reasonable request.]."
        mentions "Parameter settings". Those should be considered as APSA. Therefore, the section is classified as "restricted_access" along the "manuscript_code_availability".
      - >
        The statement "this manuscript has no associated code/ software. [author’s comment: the code for this work is written in python and handles. It is available in source format from the corresponding author upon reasonable request for colleagues needing it for similar analyses.]." 
        together with many others showcase the ambiguous case whereby the initial boilerplate sentence makes a negative availability claim (i.e. no code associated) BUT are later contradicted by other sentences mentioning an ASPA and its related access condition.
        As per the rules explained in the general prompt, the initial boilerplate sentence's assertion that no code is associated with the study is overridden by subsequently provided information. 
        Therefore, these statements are classified following the access condition specified for the ASPA, which in cases mentioned for this category is "restricted_access". 
      - > 
        In the statement "code/software will be made available on reasonable request. [author’s comment: all data included in this manuscript were generated using the iebe music code, which is publicly accessible on github. 
        The code analysed during the current study is available from the authors on reasonable request.]." the only element of software that is described as openly available is an EST since no authorship or provision signal is present, and the code is described as "already publicly available".
        The only APSA present is described as available upon request. Therefore, the section is classified as "restricted_access" along the "manuscript_code_availability" dimension. 
      - >
        The second statement in the third hard positive pair shows an example of where the access conditions specified in the initial boilerplate statement can be attributed to a subsequently mentioned APSA.
        This is possible because all criteria necessary for this attribution are met. There is only one eligible APSA the access conditions can be attributed to and the APSA mention does not specify any other access condition. 
  - category_name: no_access
    category_description: This category includes code availability statements where Author-Produced Software Artifacts are not accessible under any access condition explicitly specified in the statement.
    category_exemplars:
      - "The code associated with this manuscript is not available for publication"
      - "The code associated with this manuscript cannot be made available due to the terms of use preventing public distribution"
      - "The software developed in this work is not publicly available"
      - >
        "My manuscript has no associated code/software. [author’s comment: code/software sharing for this article is not applicable because no software was generated during the process and codes used by authors were not written for publication purposes. 
        For colleagues who want to perform the same calculations, following the theoretical explanations which are provided throughout the text will be sufficient.]."
      - > #ADDRESS
        "This manuscript has no associated code/software. [authors’ comment: atlas collaboration software is open source, and all code necessary to recreate an analysis is publicly available. 
        The athena (http://gitlab.cern.ch/atlas/athena) software repository provides all code needed for calibration and uncertainty application, with configuration files that are also publicly available via docker containers and cv mfs. 
        The specific code and configurations written in support of this analysis are not public; however, these are internally preserved.]."
      - >
        "This manuscript has no associated code/software. [authors’ comment: we utilized publicly available codes in this study. 
        While we developed additional code to efficiently interface with these public codes, we believe that this auxiliary code does not provide significant standalone value to warrant publication or public sharing.]."
      - >
         "code/software cannot be made available for reasons disclosed in the code availability statement. [authors’ comment: the code/software developed for this study is not publicly available in order to protect intellectual property and avoid unintended reuse or misinterpretation. 
         However, the corresponding author is happy to provide methodological guidance or relevant implementation details upon reasonable request via email, especially for academic and noncommercial research purposes.].
      - >
         "Code/software cannot be made available for reasons disclosed in the code availability statement. 
         [authors’ comment: the code utilized in the current study is not publicly available because co-owned by other authors, but details can be shared by the corresponding author on reasonable request.]."
    category_hard_positives:
      - - "The code associated with this manuscript cannot be made available due to the terms of use preventing public distribution"
        - >
          "This manuscript has no associated code/software. [author’s comment: the calculations were performed with short, standard mathematica scripts that simply evaluate the same results. 
          These scripts contain no new algorithms or software packages and therefore offer no added value to the reader.]." 
    category_hard_negatives:
      - - "This manuscript has no associated code/software. [author's comment: Python scripts were used for numerical computations]"
        - "This manuscript has no associated code/software. [author’s comment: all calculations were performed analytically. some results were verified using maple symbolic computation software.]."
      - - "The software developed in this work is not publicly available"
        - "The numerical analysis software used in this work is not publicly available"
    explicit_decision_rules: 
      inclusion: >
        A code availability statement is included in this category when the content implies that the Author-Produced Software Artifacts described are NOT accessible under any condition to the reader.
        This criterion for inclusion is independent of a reason being specified for lack of accessibility and if specified, of the reason itself.
        A code availability statement is ALSO included in this category when an APSA is mentioned without any access condition BUT the initial boilerplate sentence says there is no code associated with the study.
        In such cases, the APSA is to be considered NOT available and the section is classified as part of this category 
      exclusion: >
        A code availability statement is excluded from this category if it states that an Author-Produced Software Artifact can be accessed, regardless of the access conditions.
        This includes cases where all identifiable APSAs can be accessed publicly, only part can be accessed publicly, all can be accessed but under specific circumstances (e.g. upon request)
        or some can be accessed under specific circumstances. As long as at least one identifiable Author-Produced Software Artifact can be accessed under some condition, code availability statements 
        should be excluded from this category.   
    ambiguous_cases_notes:
      - >
        In the statement "This manuscript has no associated code/software. [authors’ comment: atlas collaboration software is open source, and all code necessary to recreate an analysis is publicly available. 
        The athena (http://gitlab.cern.ch/atlas/athena) software repository provides all code needed for calibration and uncertainty application, with configuration files that are also publicly available via docker containers and cv mfs. 
        The specific code and configurations written in support of this analysis are not public; however, these are internally preserved.]." only one identifiable APSA is present (i.e. "The specific code and configuration") and it is described as "not public" and "internally preserved". 
        That qualifies it as not obtainable by the reader. Therefore, the section is classified as "no_access" under the "manuscript_code_availability" dimension.  
      - >
        The second example of the first hard positive pair is a statement that satisfies the second rule for inclusion. Specifically, one APSA is mentioned (i.e. "short, standard mathematica scripts") with no accompanying specified access condition.
        Since the initial boilerplate sentence states that the manuscript "has no associated code/software", the section is therefore classified as "no_access" under the "manuscript_code_availability" dimension.  
      - >
        The negative case of the first hard negative pair does NOT satisfy the second rule for inclusion in this category. 
        This is because even though the initial boilerplate sentence states that the manuscript "has no associated code/software", only an EST is mentioned in the subsequent sentence. 
        Since there is no identifiable APSA presented, the section CANNOT be classified as "no_access"
      - >
        In the third hard negative pair, the positive example gives information about access condition of an APSA, as evidenced by linguistic signals of authorship (i.e. "developed"). 
        Since the software is described as not publicly available, the section is classified as "no_access". 
        The negative example only mentions an EST not being publicly available (i.e. "The numerical analysis software used"). Since no APSA is mentioned, the section is not classified as "no_access".
      - >
        The statement "code/software cannot be made available for reasons disclosed in the code availability statement. [authors’ comment: the code/software developed for this study is not publicly available in order to protect intellectual property and avoid unintended reuse or misinterpretation. 
        However, the corresponding author is happy to provide methodological guidance or relevant implementation details upon reasonable request via email, especially for academic and noncommercial research purposes.]." explicitly states that code is not publicly available and does not specify any condition under which code can be accessed. "Implementation details" and "methodological guidance" are not APSAs. 
        Therefore, access conditions relative to these objects does NOT influence classification as per code availability. The statement "Code/software cannot be made available for reasons disclosed in the code availability statement. 
        [authors’ comment: the code utilized in the current study is not publicly available because co-owned by other authors, but details can be shared by the corresponding author on reasonable request.]." is a similar case where "details" cannot be considered APSAs and therefore the section is also classified as "no_access"
