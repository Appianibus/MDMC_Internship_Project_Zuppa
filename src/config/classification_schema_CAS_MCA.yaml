    explicit_decision_rules:
      inclusion: >
        A code availability statement section is included in this category when all Author-Produced Software Artifacts that are mentioned are described as being openly available. 
        A section is also included in this category if the first part mentions that there is no code/software "associated" with the manuscript BUT it then states that all APSAs mentioned are openly available. 
        The access condition of External Software Tools mentioned in the section should NOT matter for classifying a section as "open_access". 
        Only access conditions of APSAs are relevant for classification in this dimension.
      exclusion: >
        A code availability statement section is excluded from this category when it mentions that all or part of the Author-Produced Software Artifacts mentioned are NOT openly available. 
        If no APSA is explicitly or implicitly identifiable, the section MUST NOT be classified as open_access.
      exclusion_criteria:
        - The section ONLY states that there is no code/software associated with the study/manuscript
        - The section states that only SOME APSAs are openly available
        - The section states that one or more APSAs are not openly available
        - The section states that one or more APSAs are not available under any circumstance
    ambiguous_cases_notes:
      - >
        The statement "My manuscript has associated code/software in a data repository. [author’s comment: all analytical computations reported in this manuscript have been rechecked in the computer algebra system maple.
        Two maple sheets corresponding to the extreme and non extreme cases can be found in supplementary materials and in the repository below. 
        The discretization of differential operators (23)–(25) and (41)–(43) using the tchebyshev type spectral method is equally performed in maple computer algebra system. 
        Finally, the numerical solution of the resulting quadratic eigenvalue problem (48) is performed in matlab software using the polyeig function. 
        All these materials are freely accessible at the following repository https://github.com/dutykh/ellisbronnikov/.]." and the second section in the first hard positive pair is classified as "open_access" because the only APSA mentioned "maple sheets" is described as being openly available. All other elements of code/software are ESTs.
      - >
        The statement "this manuscript has no associated code/software. [authors’ comment: the code used in this project is publicly available at the following repository: https://github.com/opengpd/gpddatabase (see ref. [78])." showcases the notion that you can IGNORE the first part of a code availability statement saying there is no code associated with the study IF what follows clearly mentions an APSA.
        In this case, in the author's comment, there's mention of "all code discussed in this paper" that is a signal for an APSA being present. 
        Since the only APSA mentioned is described as openly available, the section is classified as "open_access"
      - >
        The first section of the second hard positive pair showcases an important concept. In the section, "mixing matrices [...] contained within the mathematica package" are mentioned. 
        These should be considered APSA because their availability in supplemental material AND the fact they were "computed" as part of the study indicates they are author-controlled/produced. 
        Even if a third-party software is used as container/computational environment for an author-produced artifact, that artifact should still be considered as an APSA. 
      - The positive example of the fourth hard positive pair mentions "code provided at the link". Considering the code is "provided" with an associated link, this should be considered as an APSA.
        Since it is the only APSA mentioned and it's openly available, the section is classified as "open_access".
