    explicit_decision_rules:
      inclusion: > 
        A code availability statement section is included in this category when the content states that no Author-Produced Software Artifact is associated, was generated, adapted or curated in the course of the study. 
        Only and only if the information in the section does NOT state that even a single Author-Produced Software Artifact is presented with the manuscript, the section is included in this category. 
      exclusion: >
        A code availability statement section is excluded from this category when the content states that AT LEAST ONE Author-Produced Software Artifact is presented with the manuscript. 
        This is true EVEN IF the first part of the section states that the study/manuscript has no associated code/software. As long as some other part of the section mentions an Author-Produced Software Artifact (APSA), 
        the section is excluded from this category. 
    ambiguous_cases_notes:
      - >
        At times, sections first state that there is no code/software associated with the manuscript BUT later mention either an Author-Produced Software Artifact, or External Software Tool.  
        You must carefully check that no part of the section explicitly mentions an Author-Produced Software Artifact as being created, generated, or used for some aspect of the study. If a section mentions an Author-Produced Software Artifact,
        it should NOT be categorized as part of the "no_code" category. If a section EXCLUSIVELY mentions an External Software Tool being used, it should be categorized as part of the "no_code" category when the first part mentions no code/software associated with the study.
      - >
        The following exemplar:
        
        "my manuscript has no associated code/ software. [author’s comment: code/software sharing not applicable to this article as no code/software was generated during the current study.
        The numerical analysis was performed using the public open source software flavio.]."
        
        states that there is no code associated with the study. It then mentions that an open source software was used. This section should be classified as part of this category because an open source software tool should NOT
        be considered as an Author-Produced Software Artifact. An open source software tool should instead be considered as an External Software Tool. Therefore, information about the open source software tool should EXCLUSIVELY be used to classify
        sections along the dimension "external_tool_availability", not alongside the current dimension "manuscript_code_availability". Exemplar from 15 to 21 are similar cases among others. 
      - >
        The negative example of the third hard negative pair should NOT belong to the no_code category, since "code necessary to recreate an analysis" should count as an APSA, as well as "code and configurations written in support of this analysis". This is because it can be inferred that these elements of code/software are something directly related to the manuscript,
        and therefore most likely artifacts that were produced and can be made available by the authors of the study. The "Atlas collaboration software" mentioned as open source is an EST and therefore its condition of access (i.e. open source) should be irrelevant for the classification in this dimension.
        The positive example of the same pair exclusively mentions an EST (i.e. fenicsx open Python package). Therefore, the section is classified as "no_code" along the "manuscript_code_availability" dimension. 
      - >
        The fourth hard negative pair exemplifies the difference between Author-Produced Software Artifact and External Software Tool. The positive example mentions "mathematica software". This, by itself, counts as an EST, as evidenced by the use of the verbal expression "used to" and by prior knowledge of Wolfram Mathematica being a proprietary software.
        The negative case ALSO mentions a "Mathematica program" BUT also specifies that this can be "requested from the authors". The property of being requestable by the author therefore qualifies this as an APSA. Given an APSA is mentioned, this section is NOT classified as part of the "no_code" category in the dimension at hand.
      - >
        The following exemplar mentions "parameters" being documented in the manuscript:
        
        "this manuscript has no associated code/software. [author’s comment: all codes and software used in this work are publicly available, and all parameters have been thoroughly documented in the manuscript to ensure full reproducibility." 

        "Parameters" in this context cannot reasonably be considered as APSA, as they are not explicitly described as research software artifacts.
        Therefore, the section is classified as "no_code" since no APSAs are mentioned.  
      - > 
        The following exemplar is a VERY IMPORTANT case:

        "This manuscript has associated code/software in a data repository. [author’s comment: the analysis in this study made use of publicly available cosmological codes: 
        class (cosmic linear an isotropy solving system): https://github.com/lesgourg/class_public cobaya (code for bayesian analysis): https://github.com/cobayasampler/cobaya. 
        No new proprietary software was developed in the course of this work.]]."

        It shows how EVEN IF the first part of the code availability statement says there IS code/software associated with the study, this does not necessarily imply that there are APSAs associated with it.
        In this case, after the first part, only the availability of third-party software tools/packages is discussed. These tools are ESTs and should NOT influence classification in this dimension. 
        The section is therefore classified as "no_code" since no APSAs are mentioned.
      - > 
        The following exemplar is an ambiguous case:

        "My manuscript has associated code/software in a data repository. [author’s comment: the neural network global fit of cffs used in this analysis is available in the partons framework [84]. 
        The code of this framework is open source and can be found online at https://drf-gitlab.cea.fr/partons/core/partons on version 3 of the gpl (gplv 3).]."

        The phrase “neural network global fit” refers to a methodological component of the analysis, but there is no explicit indication that this corresponds to a software artifact implemented, curated, or produced by the authors.
        Therefore, no APSA is explicitly identified in the section.
        Although third-party software platforms are mentioned, such information is not relevant for the "manuscript_code_availability" dimension.
        The section is therefore classified as “no_code”.
