        - "code/software will be made available on reasonable request. [authors’ comment: code/software sharing is not applicable to this paper.]."
      - - "my manuscript has no associated code/ software. [authors’ comment: the PDF2ISR code will be implemented as a plugin to Pythia8, and can, in the meanwhile, be obtained upon request from the authors.]."
        - "my manuscript has no associated code/ software. [author’s comment: the public release of data supporting the findings of this article will follow the cern open data policy [74]. inquiries about plots and tables associated with this article can be addressed to atlas.publications@cern.]."
      - - "code/software will be made available on reasonable request. [authors’ comment: this is a theoretical paper. the associated code could be made available with a reasonable request to the authors.]."
