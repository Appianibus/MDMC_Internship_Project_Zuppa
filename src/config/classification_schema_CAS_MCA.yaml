    explicit_decision_rules:
      inclusion: >
        A code availability statement is included in this category when information on the access conditions of Author-Produced Software Artifacts is ambiguous or circular. 
        Also, sections are included in this category when they make positive availability claims and later statements logically contradict them. 
        For instance, a statement mentioning that code will be made available upon request and later stating that code sharing is not applicable should be classified as "unclear". 
      exclusion: 
        A code availability statement is excluded from this category when the content states information about code availability that clearly indicates the
        access conditions of identifiable Author-Produced Software Artifacts.
        Also, sections are NOT automatically included in this category if they make negative availability claims and later statements logically contradict them. 
        In those cases, the negative availability claim can be overridden by later information on the access conditions of identifiable Author-Produced Software Artifact.  
    ambiguous_cases_notes:
      - >
        Statements like "code/software will be made available on reasonable request. [author’s comment: code/software sharing not applicable to this article as no code/software was generated or analysed during the current study.]." or
        "this manuscript has associated code/ software in a data repository. [authors’ comment: code/software sharing not applicable to this article as no code/software was generated or analysed during the current study.]." 
        are examples of statements that first make a positive availability claim and later CONTRADICT it by stating that code sharing is not applicable to the study at hand or that code is not available.
      - >
        The statement "code/software cannot be made available for reasons disclosed in the code availability statement." 
        is an example of statement that ought to be considered circular. The statement states that information on the reasons for a certain access condition is given in the statement itself, without specifying anything more. 
      - >
        The statement "this manuscript has no associated code/software. [author’s comment: all the information about use of code is given in manuscript.]."
        makes a negative availability claim that could potentially be overridden by further information on access conditions BUT "information about the use of code" cannot be considered clear information about availability of an Author-Produced Software Artifact.
        Therefore, the section is classified as "unclear".
      - >
        The statement "this article has no associated code available at the time of publication. The code used in this article will be made available online soon." 
        also makes a negative availability claim that could potentially be overridden by further information on access conditions BUT information stating that APSA "WILL be made available soon" is not considered clear information about availability of APSAs.
        There is no clear timeline on when the APSA in question will be made available. Therefore, the section is classified as "unclear". 
        The statement "my manuscript has associated code/ software in a data repository. [author’s comment: the code used to generate results in this article will be made available in the next release of the pythia 8.3 code [https://pythia.org/]." 
        is a similar case where a positive availability claim is made about an APSA, but then the use of the future tense makes the access conditions ambiguous.
      - >
        The statement "inquiries about the code in this work will be responded to by the corresponding authors." exclusively states information about the opportunity of giving further information about Author-Produced Software Artifacts. 
        Even if it is information about Author-Produced Software Artifacts, it cannot be considered clear information about availability of APSAs. Therefore, the section is classified as "unclear".
         
      
        



