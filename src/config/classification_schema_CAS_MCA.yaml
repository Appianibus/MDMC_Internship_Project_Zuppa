          but numerical results can be made available upon reasonable request. the sherpa (version 3), powheg box (version res, package v v pol), and mad graph (version 5) are publicly available event generators.]."
      - - "my manuscript has associated code in a repository [49] [author's comment: the code developed for numerical computation is based on the CERN collaboration code, publicly available at https://home.cern/.
           Config files are available upon request.]"
        - "code/software will be made available on reasonable request. [author’s comment: the simulation code is based on the milc collaboration’s code, publicly available at https://github.com/milcqcd/.]"
      - - "Part of our code is already publicly available. Nonetheless, the remainder will be made available upon reasonable request"
        - "This work takes advantage of codes that are already publicly available. Nonetheless, our code will be made available on reasonable request."
    explicit_decision_rules:
      inclusion: >
        A code availability statement section is included in this category when AT LEAST ONE but NOT ALL Author-Produced Software Artifacts mentioned are described as openly available. 
      exclusion: >
        A code availability statement section is excluded from this category when a section mentions that APSA mentioned are either ALL openly available, ALL under restricted access conditions, ALL unavailable or when SOME are under restrcited access conditions AND SOME are unavailable.
        At least one but not all ESTs mentioned being openly available SHOULD NOT qualify a section as being "partial_access" for the dimension "manuscript_code_availability". Access conditions of ESTs are irrelevant for classification in this dimension. 
    ambiguous_cases_notes:    
      - >
        The statement "This manuscript has associated code/software in a data repository. [authors’ comment: code sharing is not applicable to the analysis software. 
        The software used in the model dependent interpretation of the exclusion limits is available in the zenodo repository https://doi.org/10.5281/zenodo.5844010.]." mentions "the analysis software" and "software used in model dependent interpretation". These are arguably difficult to cleanly identify as either APSA or EST. As mentioned in the general instructions provided in the initial prompt, 
        these elements of code/software should be heuristically interpreted as APSA due to the section explicitly stating there is code associated with the manuscript, and no identifiable, explicit third-party ownership attribution. 
        Therefore, the section is classified as "partial_access" since at least one but not all elements are described as openly available.
      - >
        The statements "code/software will be made available on reasonable request. [author’s comment: code available at https://zenodo.org/records/12576982.]." and 
        "code/software will be made available on reasonable request. [authors’ comment: the code is also available on github at https://github.com/croi900/genesys.]." 
        first mention code that can be made available upon request, while later mentioning code being made available in two repositories. 
        Indications on provision and the first part mentioning code available upon request qualifies the elements of code mentioned as APSA. Given there is mention of code being available upon request AND code being openly available in a repository, 
        AT LEAST ONE but NOT ALL APSAs mentioned are indicated as openly available. Therefore, the section is classified as "partial_access".
      - >
        The statement "Software/code that is associated with this publication and that is publicly available is referenced within the publication content. 
        Specific analysis software/code used to produce the results shown in the publication is preserved within the lhcb collaboration internally and can be provided on reasonable request, 
        provided it doesn’t contain information that can be associated with unpublished results." is an arguably ambiguous case. Two distinct elements of software are identifiable given the section makes two different, non-contradictory access claims for two objects (i.e. one "publicly available", the other available "on reasonable request").
        The second is an APSA since it's described as a study-specific software, internal, whose access is request-based and that's being used to produce the results in the analysis. 
        The first (i.e "Software/code that is associated with this publication and that is publicly available") defaults to APSA classification due to lack of strong EST indicators and presence of weak APSA signals, specifically the linguistic mark "associated with the study".
        Therefore, the final classification is "partial_access", since at least one (even if weakly inferred as such) BUT not all mentioned APSA are openly available. 
        The uncertainty around correctly identifying one element as an APSA or EST should be reflected in the level of confidence you provide alongside the classification.
      - >
        The negative example of the first hard negative pair should not be included in this category because only ESTs are described as openly available. 
        Specifically, "the software for detector simulation [...]" and the "root open source software" are the identifiable elements of software described as open. 
        Considering there is no indication of authorship or of these elements being made available by the authors, they are classified as ESTs.
        Therefore, their access condition does NOT influence classification for the "manuscript_code_availability" dimension. 
        Configuration files and macros should instead be considered APSAs and should therefore guide classification. Since none of these elements is described as openly available,
        the section is not classified as "partial_access"
      - >
        Similarly to the case discussed above, also the negative example of the second hard negative only mentions ESTs as openly available and should therefore NOT be categorized as "partial_access".
        There is only one, weakly inferred ASPA (i.e."code/software [...] available on reasonable request") mentioned in the section which is not described as open. 
      - >
        The third hard negative pair showcases a case where the initial boilerplate sentence can be used to qualify access conditions for an element described subsequently.
        The initial sentence does not have an explicit referent, but later qualifies access conditions for an APSA mentioned.
        Specifically, in the positive case, the author mentions there is code associated with the study in a repository, and later mentions an APSA for "numerical computations". 
        In such a case, information given in the initial statement is related to the APSA described in the author's comment. The "collaboration code" mentioned is an EST.
        Given the APSA mentioned is qualified as open, at least one but not all (i.e. "config files" are not) APSAs are described as openly available, and the section is therefore classified as "partial_access".
        The negative example is structurally similar in that the intial sentence also qualifies the access condition of a later-mentioned APSA (i.e. "simulation code"), but it qualifies it as being available upon request.
        Therefore, no APSA mentioned is described as openly available, and the section is not classified as "partial_access".
      - >
        In the positive example of the fourth hard negative pair, the first distinct identifiable element of code/software is an ASPA, as evidence by the authorship linguistic signal "our code". 
        Therefore, the section is classified as "partial_access" since at least one but not all elements are described as openly available.
        In the negative example of the pair, the first distinct identifiable element of code/software is an EST. This is because there is a generic reference to "codes" already available with no authorship or provision linguistic signal.
        Since no identifiable APSA is described as openly available, the section is NOT classified as part of this category.  
