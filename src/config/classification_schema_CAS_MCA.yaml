          "This article has associated code in a code repository. all our analytical results for the observables (impulse, spin kick, scattering angle) up to and including 
          the (physical) 7 pm order as well as the ssc preserving wilson coefficients are provided in an accompanying zenodo.org [104] submission. 
          The code to generate these, that can be used to generate even higher orders or work with different metrics, can be made accessible by reasonable request to the authors." 
